<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>彩色鱼群 · Boids Flocking</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #211d27; }
  canvas { display: block; touch-action: none; }
  #hint {
    position: fixed; left: 18px; bottom: 16px;
    color: rgba(255, 255, 255, 0.38);
    font: 13px/1.6 system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0.05em;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="hint">移动鼠标 引导鱼群 · 按住鼠标/屏幕 驱散 · 按 D 显示调试线</div>
<script>
(() => {
'use strict';

const TAU = Math.PI * 2;
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
let bgCanvas = null;

/* ---------- 配置：想调手感改这里 ---------- */
const CFG = {
  perception: 64,    // 邻居感知半径 (px)
  sepDist:    25,    // 分离作用距离
  maxSpeed:   3.4,   // px / 帧 (按 60fps 折算)
  minSpeed:   1.7,
  maxForce:   0.08,  // 单条规则的最大转向力
  wSep:   1.45,      // 分离权重：决定鱼之间的疏密
  wAlign: 0.95,      // 对齐权重：决定队形整齐度
  wCoh:   0.55,      // 聚合权重：决定成群倾向
  wFlow:  0.30,      // 全局流场权重：产生大尺度涡旋/回环
  wMouse: 0.55,      // 鼠标吸引权重
  wEdge:  1.5,       // 边缘回转权重
  edgeMargin: 90,
};

/* ---------- 色板：粉 / 紫 / 蓝 粉彩 ---------- */
const PALETTE = [
  '#ffc4e1', '#ffabd3', '#eec6ff', '#cfb5ff',
  '#bdd0ff', '#a9e2ff', '#f3e2ff', '#ffd6ec',
];

function hexToRgb(h) {
  const n = parseInt(h.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

/* 预渲染每种颜色的径向渐变光晕 sprite，避免实时 shadowBlur 的开销 */
function makeGlowSprite(hex) {
  const [r, g, b] = hexToRgb(hex);
  const s = 96;
  const cv = document.createElement('canvas');
  cv.width = cv.height = s;
  const c = cv.getContext('2d');
  const grad = c.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  grad.addColorStop(0,    'rgba(' + r + ',' + g + ',' + b + ',0.50)');
  grad.addColorStop(0.45, 'rgba(' + r + ',' + g + ',' + b + ',0.14)');
  grad.addColorStop(1,    'rgba(' + r + ',' + g + ',' + b + ',0)');
  c.fillStyle = grad;
  c.fillRect(0, 0, s, s);
  return cv;
}
const GLOWS = PALETTE.map(makeGlowSprite);

/* ---------- 背景：深色 + 隐约斜纹 + 渐晕 ---------- */
function makeBackground() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = Math.round(W * DPR);
  bgCanvas.height = Math.round(H * DPR);
  const c = bgCanvas.getContext('2d');
  c.scale(DPR, DPR);
  c.fillStyle = '#211d27';
  c.fillRect(0, 0, W, H);

  c.globalAlpha = 0.05;
  c.strokeStyle = '#000';
  c.lineWidth = 2;
  for (let i = -H; i < W + H; i += 14) {
    c.beginPath();
    c.moveTo(i, 0);
    c.lineTo(i + H, H);
    c.stroke();
  }
  c.globalAlpha = 1;

  const g = c.createRadialGradient(
    W / 2, H / 2, Math.min(W, H) * 0.25,
    W / 2, H / 2, Math.hypot(W, H) * 0.6
  );
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(8,6,12,0.55)');
  c.fillStyle = g;
  c.fillRect(0, 0, W, H);
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  makeBackground();
}
window.addEventListener('resize', resize);
resize();

/* ---------- 鱼群初始化 ---------- */
const fish = [];
function initFish() {
  fish.length = 0;
  const target = Math.max(140, Math.min(300, Math.round(W * H / 4200)));
  for (let i = 0; i < target; i++) {
    const a = Math.random() * TAU;
    const sp = CFG.minSpeed + Math.random() * (CFG.maxSpeed - CFG.minSpeed);
    fish.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      ci: (Math.random() * PALETTE.length) | 0,   // 颜色索引
      size: 0.85 + Math.random() * 0.6,           // 体型
      ph: Math.random() * TAU,                    // 尾鳍相位
    });
  }
}
initFish();

/* ---------- 空间哈希网格：邻居查询从 O(n²) 降到近似 O(n) ---------- */
const grid = new Map();
const CELL = CFG.perception;

function cellKey(cx, cy) {
  /* 整数哈希，避免字符串拼接的分配；偶发碰撞无害（后续仍有距离判定）*/
  return (cx * 73856093) ^ (cy * 19349663);
}

function buildGrid() {
  grid.clear();
  for (let i = 0; i < fish.length; i++) {
    const f = fish[i];
    const k = cellKey((f.x / CELL) | 0, (f.y / CELL) | 0);
    const arr = grid.get(k);
    if (arr) arr.push(i);
    else grid.set(k, [i]);
  }
}

/* ---------- 全局流场：sin/cos 合成的时变向量场，驱动大尺度回环 ---------- */
function flowAngle(x, y, t) {
  const s = 0.0016;
  return (
    Math.sin(y * s * 2.0 + t * 0.28) +
    Math.cos(x * s * 1.6 - t * 0.22) +
    Math.sin((x + y) * s * 0.9 + t * 0.15)
  ) * 1.6;
}

/* steer: 期望方向 -> 归一化到 maxSpeed -> 减当前速度 -> 截断到 maxForce
   结果写入模块级 stX/stY，避免每帧上千次小对象分配 */
let stX = 0, stY = 0;
function steer(f, dx, dy) {
  const m = Math.hypot(dx, dy);
  if (m < 1e-6) { stX = 0; stY = 0; return; }
  let x = (dx / m) * CFG.maxSpeed - f.vx;
  let y = (dy / m) * CFG.maxSpeed - f.vy;
  const fm = Math.hypot(x, y);
  if (fm > CFG.maxForce) {
    x = (x / fm) * CFG.maxForce;
    y = (y / fm) * CFG.maxForce;
  }
  stX = x; stY = y;
}

const mouse = { x: 0, y: 0, active: false, down: false };

/* ---------- 每帧更新 ---------- */
function update(t, dt) {
  buildGrid();
  const pr2 = CFG.perception * CFG.perception;
  const sd2 = CFG.sepDist * CFG.sepDist;

  for (let i = 0; i < fish.length; i++) {
    const f = fish[i];
    let alX = 0, alY = 0, cohX = 0, cohY = 0, sepX = 0, sepY = 0, n = 0;

    const cx = (f.x / CELL) | 0;
    const cy = (f.y / CELL) | 0;
    for (let gx = cx - 1; gx <= cx + 1; gx++) {
      for (let gy = cy - 1; gy <= cy + 1; gy++) {
        const arr = grid.get(cellKey(gx, gy));
        if (!arr) continue;
        for (let m = 0; m < arr.length; m++) {
          const j = arr[m];
          if (j === i) continue;
          const o = fish[j];
          const dx = o.x - f.x, dy = o.y - f.y;
          const d2 = dx * dx + dy * dy;
          if (d2 > pr2) continue;
          alX += o.vx; alY += o.vy;     // 对齐：累加邻居速度
          cohX += o.x; cohY += o.y;     // 聚合：累加邻居位置
          n++;
          if (d2 < sd2 && d2 > 1e-4) {  // 分离：按 1/d² 反向推开
            const inv = 1 / d2;
            sepX -= dx * inv;
            sepY -= dy * inv;
          }
        }
      }
    }

    let fx = 0, fy = 0;
    if (n > 0) {
      steer(f, alX / n, alY / n);
      fx += stX * CFG.wAlign; fy += stY * CFG.wAlign;
      steer(f, cohX / n - f.x, cohY / n - f.y);
      fx += stX * CFG.wCoh; fy += stY * CFG.wCoh;
    }
    if (sepX !== 0 || sepY !== 0) {
      steer(f, sepX, sepY);
      fx += stX * CFG.wSep; fy += stY * CFG.wSep;
    }

    /* 流场 */
    const fa = flowAngle(f.x, f.y, t);
    steer(f, Math.cos(fa), Math.sin(fa));
    fx += stX * CFG.wFlow; fy += stY * CFG.wFlow;

    /* 鼠标交互：移动=温和吸引，按住=就近驱散 */
    if (mouse.active) {
      const mdx = mouse.x - f.x, mdy = mouse.y - f.y;
      const md = Math.hypot(mdx, mdy);
      if (mouse.down) {
        if (md < 260) {
          steer(f, -mdx, -mdy);
          const boost = 0.6 + 2.4 * (1 - md / 260);
          fx += stX * boost; fy += stY * boost;
        }
      } else if (md < 340 && md > 36) {
        steer(f, mdx, mdy);
        fx += stX * CFG.wMouse; fy += stY * CFG.wMouse;
      }
    }

    /* 边缘软回转 */
    let ex = 0, ey = 0;
    if (f.x < CFG.edgeMargin) ex = 1;
    else if (f.x > W - CFG.edgeMargin) ex = -1;
    if (f.y < CFG.edgeMargin) ey = 1;
    else if (f.y > H - CFG.edgeMargin) ey = -1;
    if (ex || ey) {
      steer(f, ex, ey);
      fx += stX * CFG.wEdge; fy += stY * CFG.wEdge;
    }

    /* 积分 + 限速（保持最低速度，鱼永远在游） */
    f.vx += fx * dt;
    f.vy += fy * dt;
    const sp = Math.hypot(f.vx, f.vy);
    if (sp > CFG.maxSpeed) {
      f.vx = f.vx / sp * CFG.maxSpeed;
      f.vy = f.vy / sp * CFG.maxSpeed;
    } else if (sp < CFG.minSpeed && sp > 1e-6) {
      f.vx = f.vx / sp * CFG.minSpeed;
      f.vy = f.vy / sp * CFG.minSpeed;
    }
    f.x += f.vx * dt;
    f.y += f.vy * dt;

    /* 兜底：极端情况拉回画面附近，让边缘力接管 */
    if (f.x < -40) f.x = -40; else if (f.x > W + 40) f.x = W + 40;
    if (f.y < -40) f.y = -40; else if (f.y > H + 40) f.y = H + 40;

    /* 尾鳍摆动相位：游得越快摆得越快 */
    f.ph += dt * (0.22 + sp * 0.09);
  }
}

/* ---------- 绘制 ---------- */
let debug = false;

function drawFishBody(f) {
  const wig = Math.sin(f.ph) * 0.55;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(Math.atan2(f.vy, f.vx));
  ctx.scale(f.size, f.size);
  ctx.fillStyle = PALETTE[f.ci];

  /* 身体（朝 +x） */
  ctx.beginPath();
  ctx.moveTo(9.5, 0);
  ctx.quadraticCurveTo(4.5, 3.6, -2.5, 2.3);
  ctx.quadraticCurveTo(-5.5, 1.4, -6.5, 0);
  ctx.quadraticCurveTo(-5.5, -1.4, -2.5, -2.3);
  ctx.quadraticCurveTo(4.5, -3.6, 9.5, 0);
  ctx.fill();

  /* 一对后掠胸鳍 */
  ctx.beginPath();
  ctx.moveTo(2.6, 2.0);
  ctx.quadraticCurveTo(0.4, 5.0, -2.2, 4.6);
  ctx.quadraticCurveTo(-0.2, 2.6, 2.6, 2.0);
  ctx.moveTo(2.6, -2.0);
  ctx.quadraticCurveTo(0.4, -5.0, -2.2, -4.6);
  ctx.quadraticCurveTo(-0.2, -2.6, 2.6, -2.0);
  ctx.fill();

  /* 分叉尾鳍，绕尾柄随相位摆动 */
  ctx.translate(-5.8, 0);
  ctx.rotate(wig * 0.55);
  ctx.beginPath();
  ctx.moveTo(0.5, 0);
  ctx.quadraticCurveTo(-3.5, 1.0, -6.8, 4.4);
  ctx.quadraticCurveTo(-3.6, 0.9, -3.0, 0);
  ctx.quadraticCurveTo(-3.6, -0.9, -6.8, -4.4);
  ctx.quadraticCurveTo(-3.5, -1.0, 0.5, 0);
  ctx.fill();

  ctx.restore();
}

function draw() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.drawImage(bgCanvas, 0, 0, W, H);

  /* lighter 加色混合：重叠处自然泛白，呈现"密集即发亮"的效果 */
  ctx.globalCompositeOperation = 'lighter';

  ctx.globalAlpha = 0.5;
  for (let i = 0; i < fish.length; i++) {
    const f = fish[i];
    const s = 46 * f.size;
    ctx.drawImage(GLOWS[f.ci], f.x - s / 2, f.y - s / 2, s, s);
  }

  ctx.globalAlpha = 0.92;
  for (let i = 0; i < fish.length; i++) drawFishBody(fish[i]);

  /* 调试线：抽样画速度向量（对应原图中的绿色线段） */
  if (debug) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = '#8aff5a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let i = 0; i < fish.length; i += 23) {
      const f = fish[i];
      ctx.moveTo(f.x, f.y);
      ctx.lineTo(f.x + f.vx * 22, f.y + f.vy * 22);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

/* ---------- 输入 ---------- */
window.addEventListener('pointermove', (e) => {
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
});
window.addEventListener('pointerdown', (e) => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  mouse.active = true; mouse.down = true;
});
window.addEventListener('pointerup', (e) => {
  mouse.down = false;
  if (e.pointerType !== 'mouse') mouse.active = false;  // 触屏抬手后不再吸引
});
document.addEventListener('mouseleave', () => { mouse.active = false; mouse.down = false; });
window.addEventListener('keydown', (e) => {
  if (e.key === 'd' || e.key === 'D') debug = !debug;
});
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

setTimeout(() => {
  const h = document.getElementById('hint');
  if (h) h.style.opacity = '0';
}, 9000);

/* ---------- 主循环：dt 归一到 60fps，高刷屏速度一致 ---------- */
let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 16.667, 2.5);
  last = now;
  update(now / 1000, dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
